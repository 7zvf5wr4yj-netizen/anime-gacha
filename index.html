<head>

    <style>
        :root {
            --neon-green: #00ff41;
            --neon-pink: #ff2a6d;
            --neon-blue: #05d9e8;
            --bg-dark: #020205;
            --panel: rgba(15, 15, 25, 0.95);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg-dark);
            color: var(--neon-green);
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
        }

        /* Сканирующие линии монитора */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            z-index: 100;
            pointer-events: none;
            background-size: 100% 4px, 3px 100%;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 500px;
            margin: 0 auto;
            border: 1px solid var(--neon-green);
            position: relative;
            z-index: 10;
        }

        /* HEADER */
        .header {
            padding: 10px;
            text-align: center;
            background: var(--panel);
            border-bottom: 2px solid var(--neon-green);
        }
        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            margin: 0;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--neon-green);
        }

        /* STATS BAR */
        .stats-bar {
            display: flex;
            justify-content: space-around;
            padding: 8px;
            background: rgba(0, 255, 65, 0.05);
            font-size: 12px;
            border-bottom: 1px solid rgba(0, 255, 65, 0.3);
        }
        .stat-item span { color: var(--neon-blue); font-weight: bold; }

        /* DECK GRID */
        .deck-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 12px;
            background: rgba(0,0,0,0.4);
        }
        .slot {
            aspect-ratio: 1/1.2;
            background: #050505;
            border: 1px solid #1a1a1a;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
        }
        .slot.filled { border-color: var(--neon-green); box-shadow: 0 0 10px rgba(0, 255, 65, 0.2); }
        .slot img { width: 100%; height: 100%; object-fit: contain; border-radius: 4px; }
        .slot .plus { font-size: 24px; color: #1a1a1a; }
        
        .slot .remove-btn {
            position: absolute;
            top: -5px; right: -5px;
            background: var(--neon-pink);
            color: white;
            width: 18px; height: 18px;
            border-radius: 50%;
            font-size: 12px;
            display: none;
            align-items: center; justify-content: center;
            z-index: 5;
        }
        .slot.filled:hover .remove-btn { display: flex; }

        /* CONSOLE */
        .console {
            flex: 1;
            padding: 10px;
            font-size: 10px;
            overflow-y: auto;
            background: #000;
            color: var(--neon-green);
            border-top: 1px solid var(--neon-green);
        }
        .log-entry { margin-bottom: 4px; opacity: 0.8; }
        .log-entry.system { color: var(--neon-blue); }
        .log-entry.error { color: var(--neon-pink); }

        /* ANALYZE BUTTON */
        .btn-analyze {
            margin: 10px;
            padding: 15px;
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            font-family: 'Orbitron';
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            transition: 0.2s;
            overflow: hidden;
        }
        .btn-analyze:active { background: var(--neon-green); color: #000; }
        .btn-analyze.pulse { animation: pulseAnim 2s infinite; }

        @keyframes pulseAnim {
            0% { box-shadow: 0 0 0px var(--neon-green); }
            50% { box-shadow: 0 0 20px var(--neon-green); }
            100% { box-shadow: 0 0 0px var(--neon-green); }
        }

        /* MODAL */
        .modal {
            position: fixed; inset: 0;
            background: var(--bg-dark);
            z-index: 1000;
            display: none;
            flex-direction: column;
        }
        .modal-header {
            padding: 15px;
            display: flex;
            gap: 10px;
            background: var(--panel);
            border-bottom: 1px solid var(--neon-green);
        }
        #search {
            flex: 1;
            background: #000;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 10px;
            font-family: 'JetBrains Mono';
            outline: none;
        }
        .card-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 15px;
            overflow-y: auto;
            flex: 1;
        }
        .card-item {
            background: #0a0a0a;
            border: 1px solid #222;
            padding: 5px;
            text-align: center;
            border-radius: 4px;
            position: relative;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .card-item img { width: 100%; border-radius: 2px; }
        .card-item .cost { position: absolute; top: 2px; left: 2px; background: rgba(0,0,255,0.7); color: white; padding: 1px 4px; font-size: 10px; border-radius: 3px; }
        .card-item .name { font-size: 8px; margin-top: 4px; height: 20px; color: #888; text-transform: uppercase; overflow: hidden; }

        /* RESULT VIEW */
        .result-view {
            position: fixed; inset: 0;
            background: var(--bg-dark);
            z-index: 2000;
            display: none;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }
        .report-card {
            border: 1px solid var(--neon-green);
            padding: 20px;
            background: rgba(0, 255, 65, 0.02);
            position: relative;
        }
        .verdict-header { font-size: 20px; font-weight: 900; color: var(--neon-green); margin-bottom: 15px; text-transform: uppercase; border-bottom: 2px solid var(--neon-green); padding-bottom: 5px; }
        .archetype-tag { display: inline-block; padding: 4px 10px; background: var(--neon-blue); color: #000; font-weight: bold; font-size: 10px; margin-bottom: 15px; }
        
        .section { margin-bottom: 15px; }
        .section-h { font-size: 12px; color: var(--neon-blue); margin-bottom: 5px; font-weight: bold; }
        .section ul { padding-left: 15px; margin: 0; font-size: 11px; line-height: 1.6; }
        .plus-item { color: var(--neon-green); }
        .minus-item { color: var(--neon-pink); }
        
        .tip-box { background: rgba(5, 217, 232, 0.1); border-left: 3px solid var(--neon-blue); padding: 10px; font-size: 11px; margin-top: 15px; color: var(--neon-blue); }

        .close-result {
            margin-top: 20px;
            padding: 15px;
            background: var(--neon-green);
            color: #000;
            border: none;
            font-family: 'Orbitron';
            font-weight: 900;
            cursor: pointer;
        }

        .rarity-legendary { border-color: #00f0ff !important; }
        .rarity-champion { border-color: #ffca00 !important; }
    </style>
</head>

</div>

    { name: "Элитные варвары", id: "elite-barbarians", cost: 6, type: "troop", target: "ground", splash: false, rarity: "common" },
    { name: "Орда миньонов", id: "minion-horde", cost: 5, type: "troop", target: "air", splash: false, rarity: "common" },
    { name: "Вышибала", id: "bowler", cost: 5, type: "troop", target: "ground", splash: true, rarity: "epic" },
    { name: "Палач", id: "executioner", cost: 5, type: "troop", target: "both", splash: true, rarity: "epic" },
    { name: "Охотник", id: "hunter", cost: 4, type: "troop", target: "both", splash: false, rarity: "epic" },
    { name: "Рыбак", id: "fisherman", cost: 3, type: "troop", target: "ground", splash: false, rarity: "legendary" },
    { name: "Королевский призрак", id: "royal-ghost", cost: 3, type: "troop", target: "ground", splash: true, rarity: "legendary" },
    { name: "Дровосек", id: "lumberjack", cost: 4, type: "troop", target: "ground", splash: false, rarity: "legendary" },
    { name: "Маленький дракон", id: "electro-dragon", cost: 5, type: "troop", target: "both", splash: true, rarity: "epic" },
    { name: "Летучка", id: "flying-machine", cost: 4, type: "troop", target: "both", splash: false, rarity: "rare" },
    { name: "Мегаминьон", id: "mega-minion", cost: 3, type: "troop", target: "air", splash: false, rarity: "rare" },
    { name: "Разбойники", id: "rascals", cost: 5, type: "troop", target: "both", splash: false, rarity: "rare" },
    { name: "Королевские рекруты", id: "royal-recruits", cost: 7, type: "troop", target: "ground", splash: false, rarity: "common" }
];

let selectedDeck = Array(8).fill(null);
let activeSlotIndex = null;

// Инициализация слотов
const grid = document.getElementById('grid');
for (let i = 0; i < 8; i++) {
    const slot = document.createElement('div');
    slot.className = 'slot';
    slot.id = `slot-${i}`;
    slot.innerHTML = `<div class="plus">+</div><img id="img-${i}" style="display:none"><div class="remove-btn" onclick="removeCard(event, ${i})">×</div>`;
    slot.onclick = () => openModal(i);
    grid.appendChild(slot);
}

function openModal(index) {
    activeSlotIndex = index;
    document.getElementById('modal').style.display = 'flex';
    renderCardList();
    tg.HapticFeedback.impactOccurred('medium');
}

function closeModal() {
    document.getElementById('modal').style.display = 'none';
}

function renderCardList() {
    const search = document.getElementById('search').value.toLowerCase();
    const list = document.getElementById('card-list');
    list.innerHTML = '';

    DB.filter(card => card.name.toLowerCase().includes(search)).forEach(card => {
        const item = document.createElement('div');
        item.className = `card-item rarity-${card.rarity}`;
        item.innerHTML = `
            <div class="cost">${card.cost}</div>
            <img src="https://raw.githubusercontent.com/RoyaleAPI/cr-api-assets/master/cards/${card.id}.png" onerror="this.src='https://placehold.co/100x120?text=Error'">
            <div class="name">${card.name}</div>
        `;
        item.onclick = () => selectCard(card);
        list.appendChild(item);
    });
}

function selectCard(card) {
    // Запрет дубликатов
    if (selectedDeck.some(c => c && c.id === card.id)) {
        tg.showAlert("Эта карта уже в колоде!");
        return;
    }

    selectedDeck[activeSlotIndex] = card;
    updateDeckUI();
    closeModal();
    log(`Добавлена карта: ${card.name.toUpperCase()}`);
    tg.HapticFeedback.notificationOccurred('success');
}

function removeCard(event, index) {
    event.stopPropagation();
    selectedDeck[index] = null;
    updateDeckUI();
    log(`Карта удалена из слота ${index + 1}`);
    tg.HapticFeedback.impactOccurred('light');
}

function updateDeckUI() {
    let totalElixir = 0;
    let filledCount = 0;

    selectedDeck.forEach((card, i) => {
        const slot = document.getElementById(`slot-${i}`);
        const img = document.getElementById(`img-${i}`);
        const plus = slot.querySelector('.plus');

        if (card) {
            img.src = `https://raw.githubusercontent.com/RoyaleAPI/cr-api-assets/master/cards/${card.id}.png`;
            img.style.display = 'block';
            plus.style.display = 'none';
            slot.classList.add('filled');
            totalElixir += card.cost;
            filledCount++;
        } else {
            img.style.display = 'none';
            plus.style.display = 'block';
            slot.classList.remove('filled');
        }
    });

    const avg = filledCount > 0 ? (totalElixir / 8).toFixed(1) : "0.0";
    document.getElementById('avg-elixir').innerText = avg;
    document.getElementById('card-count').innerText = `${filledCount}/8`;
}

function log(msg, type = 'system') {
    const console = document.getElementById('console');
    const entry = document.createElement('div');
    entry.className = `log-entry ${type}`;
    entry.innerText = `> ${msg}`;
    console.prepend(entry);
}

function analyzeDeck() {
    if (selectedDeck.includes(null)) {
        tg.showAlert("Сначала собери полную колоду (8 карт)!");
        return;
    }

    const d = selectedDeck;
    const wincons = d.filter(c => c.type === 'wincon');
    const spells = d.filter(c => c.type === 'spell');
    const bigSpells = spells.filter(c => c.cost >= 4);
    const smallSpells = spells.filter(c => c.cost < 4);
    const airDefense = d.filter(c => c.target === 'both' || c.target === 'air');
    const splash = d.filter(c => c.splash);
    const buildings = d.filter(c => c.type === 'building');
    const avg = parseFloat(document.getElementById('avg-elixir').innerText);

    let plus = [];
    let minus = [];
    let archetype = "Balanced Control";
    let tip = "";

    // 1. Win Condition
    if (wincons.length === 0) {
        minus.push("Отсутствует условие победы. Тебе будет крайне сложно сносить башни.");
    } else {
        plus.push(`Наличие Win-Con: ${wincons.map(c => c.name).join(', ')}`);
    }

    // 2. Air Defense
    if (airDefense.length < 2) {
        minus.push("Критически мало ПВО. Ты беззащитен против Шара или Гончей.");
    } else if (airDefense.length >= 4) {
        plus.push("Отличная защита от воздушных целей.");
    }

    // 3. Spells
    if (spells.length === 0) {
        minus.push("Нет заклинаний. Противник легко задавит тебя количеством.");
    } else {
        if (bigSpells.length > 0 && smallSpells.length > 0) plus.push("Идеальный баланс заклинаний (Тяжелое + Легкое).");
        if (smallSpells.length === 0) minus.push("Нет легкого заклинания (Лог/Зап). Уязвим для байтинга.");
    }

    // 4. Splash & Swarm
    if (splash.length > 0) plus.push("Есть сплэш-урон для зачистки орд.");
    else minus.push("Нет АОЕ-урона. Армия скелетов станет твоим кошмаром.");

    // 5. Archetype Detection
    if (avg >= 4.0 && d.some(c => c.id === 'golem' || c.id === 'giant' || c.id === 'pekka')) archetype = "Beatdown";
    else if (avg < 3.2 && wincons.length > 0) archetype = "Cycle / Fast Control";
    else if (d.some(c => c.id === 'battle-ram' || c.id === 'bandit' || c.id === 'royal-ghost')) archetype = "Bridge Spam";
    else if (d.some(c => c.id === 'goblin-barrel' || c.id === 'skeleton-barrel')) archetype = "Log Bait";

    // 6. Buildings
    if (buildings.length > 0) plus.push("Защитное здание поможет против Хога/РГ.");
    else if (avg < 3.0) tip = "Для такого быстрого цикла здание почти обязательно (Тесла/Пушка).";

    tip = wincons.length === 0 ? "Добавь хотя бы одного Всадника на кабане или Гиганта." : "Колода выглядит рабочей. Удачи в ладдере!";

    // Render results
    document.getElementById('res-archetype').innerText = `АРХЕТИП: ${archetype}`;
    document.getElementById('res-plus').innerHTML = plus.map(p => `<li class="plus-item">${p}</li>`).join('');
    document.getElementById('res-minus').innerHTML = minus.map(m => `<li class="minus-item">${m}</li>`).join('');
    document.getElementById('res-tip').innerText = tip;
    
    document.getElementById('res-mini-deck').innerHTML = d.map(c => `<img src="https://raw.githubusercontent.com/RoyaleAPI/cr-api-assets/master/cards/${c.id}.png" style="width:100%">`).join('');

    document.getElementById('result-screen').style.display = 'flex';
    tg.HapticFeedback.notificationOccurred(minus.length > 2 ? 'warning' : 'success');
}
</script>
