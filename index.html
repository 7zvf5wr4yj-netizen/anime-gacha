<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DECK ANALYZER PRO</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&family=Orbitron:wght@900&display=swap" rel="stylesheet">
  <style>
    :root { --green: #00ff41; --red: #ff003c; --bg: #050505; --panel: #111; }
    body { background: var(--bg); color: #fff; font-family: 'JetBrains Mono', monospace; margin: 0; overflow: hidden; }
    
    .app { display: flex; flex-direction: column; height: 100vh; max-width: 500px; margin: 0 auto; background: #000; }
    .header { padding: 15px; border-bottom: 1px solid var(--green); text-align: center; }
    .header h1 { font-family: 'Orbitron'; font-size: 18px; color: var(--green); margin: 0; letter-spacing: 2px; }

    .deck-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 15px; background: #080808; }
    .slot { aspect-ratio: 1/1.2; background: #111; border: 1px dashed #333; border-radius: 4px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    .slot.filled { border: 1px solid var(--green); box-shadow: inset 0 0 10px rgba(0, 255, 65, 0.1); }
    .slot img { width: 100%; height: 100%; object-fit: contain; }
    .slot .plus { color: var(--green); font-size: 20px; opacity: 0.5; }

    .console { flex: 1; padding: 15px; font-size: 12px; color: var(--green); overflow-y: auto; background: #050505; border-top: 1px solid #222; }
    .log-line { margin-bottom: 8px; line-height: 1.4; border-left: 2px solid var(--green); padding-left: 8px; }

    .btn-run { margin: 15px; padding: 20px; background: var(--green); color: #000; border: none; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
    .btn-run:active { transform: scale(0.98); background: #00cc33; }

    /* Modal */
    .modal { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
    .search-bar { padding: 20px; display: flex; gap: 10px; }
    #search { flex: 1; padding: 12px; background: #111; border: 1px solid var(--green); color: #fff; outline: none; }
    .card-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; overflow-y: auto; }
    .card-item { background: #111; padding: 5px; text-align: center; border: 1px solid #222; }
    .card-item img { width: 100%; }

    /* Result */
    .result-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; padding: 20px; }
    .report { border: 1px solid var(--green); padding: 20px; background: #050505; flex: 1; overflow-y: auto; }
    .report-h { color: var(--green); border-bottom: 1px solid var(--green); margin-bottom: 15px; padding-bottom: 5px; font-family: 'Orbitron'; }
    .tag { display: inline-block; padding: 2px 6px; background: var(--green); color: #000; font-size: 10px; font-weight: bold; margin-bottom: 10px; }
    .section-title { color: var(--green); font-weight: 800; margin-top: 15px; display: block; text-transform: uppercase; }
    .plus-list { color: #00ff41; }
    .minus-list { color: #ff003c; }
  </style>
</head>
<body>

<div class="app">
  <div class="header"><h1>TACTICAL ANALYZER v4.0</h1></div>
  
  <div class="deck-grid">
    <script>
      for(let i=0; i<8; i++) document.write(`<div class="slot" id="s${i}" onclick="openModal(${i})"><div class="plus">+</div><img id="img${i}" style="display:none"></div>`);
    </script>
  </div>

  <div class="console" id="console">
    <div class="log-line">> Ожидание ввода данных...</div>
    <div class="log-line">> Система готова к тактическому разбору.</div>
  </div>

  <button class="btn-run" onclick="startAnalysis()">АНАЛИЗ ЭФФЕКТИВНОСТИ</button>
</div>

<div id="modal" class="modal">
  <div class="search-bar">
    <input type="text" id="search" placeholder="Поиск карты..." oninput="renderCards()">
    <button onclick="closeModal()" style="color:var(--green); background:none; border:none;">[X]</button>
  </div>
  <div class="card-list" id="card-list"></div>
</div>

<div id="result" class="result-screen">
  <div class="report" id="report-content">
    <div class="tag" id="res-tag">STABLE</div>
    <h2 class="report-h" id="res-title"></h2>
    
    <span class="section-title">Вердикт:</span>
    <p id="res-verdict"></p>
    
    <span class="section-title">Сильные стороны:</span>
    <ul class="plus-list" id="res-plus"></ul>
    
    <span class="section-title">Слабые стороны:</span>
    <ul class="minus-list" id="res-minus"></ul>

    <div id="res-grid" style="display:grid; grid-template-columns:repeat(4,1fr); gap:4px; margin-top:20px; opacity:0.5;"></div>
  </div>
  <button class="btn-run" onclick="location.reload()">НОВЫЙ ТЕСТ</button>
</div>

<script>
const tg = window.Telegram.WebApp; tg.expand();

// БАЗА ДАННЫХ (Расширенная логика)
const DB = [
  {n:"Мегарыцарь",id:"mega-knight",type:"tank",air:false,splash:true,win:false,cost:7},
  {n:"Всадник на кабане",id:"hog-rider",type:"wincon",air:false,splash:false,win:true,cost:4},
  {n:"Адская башня",id:"inferno-tower",type:"building",air:true,splash:false,win:false,cost:5},
  {n:"Арбалет",id:"x-bow",type:"wincon",air:false,splash:false,win:true,cost:6},
  {n:"Огненная лучница",id:"firecracker",type:"support",air:true,splash:true,win:false,cost:3},
  {n:"Бревно",id:"the-log",type:"spell",air:false,splash:true,win:false,cost:2},
  {n:"Стрелы",id:"arrows",type:"spell",air:true,splash:true,win:false,cost:3},
  {n:"П.Е.К.К.А.",id:"pekka",type:"tank",air:false,splash:false,win:false,cost:7},
  {n:"Шахтёр",id:"miner",type:"wincon",air:false,splash:false,win:true,cost:3},
  {n:"Шар",id:"balloon",type:"wincon",air:false,splash:false,win:true,cost:5},
  {n:"Маленький Принц",id:"little-prince",type:"support",air:true,splash:false,win:false,cost:3},
  {n:"Заморозка",id:"freeze",type:"spell",air:true,splash:false,win:false,cost:4},
  {n:"Элитные варвары",id:"elite-barbarians",type:"dps",air:false,splash:false,win:false,cost:6},
  {n:"Голем",id:"golem",type:"wincon",air:false,splash:false,win:true,cost:8},
  {n:"Скелеты",id:"skeletons",type:"cycle",air:false,splash:false,win:false,cost:1}
];

let deck = Array(8).fill(null);
let curSlot = 0;

function openModal(i) { curSlot = i; document.getElementById('modal').style.display = 'flex'; renderCards(); }
function closeModal() { document.getElementById('modal').style.display = 'none'; }

function renderCards() {
  const q = document.getElementById('search').value.toLowerCase();
  const list = document.getElementById('card-list');
  list.innerHTML = DB.filter(c => c.n.toLowerCase().includes(q)).map(c => `
    <div class="card-item" onclick="selectCard('${c.n}')">
      <img src="https://raw.githubusercontent.com/RoyaleAPI/cr-api-assets/master/cards/${c.id}.png">
      <div style="font-size:8px;">${c.n}</div>
    </div>
  `).join('');
}

function selectCard(name) {
  const card = DB.find(c => c.n === name);
  deck[curSlot] = card;
  const s = document.getElementById(`s${curSlot}`);
  s.querySelector('img').src = `https://raw.githubusercontent.com/RoyaleAPI/cr-api-assets/master/cards/${card.id}.png`;
  s.querySelector('img').style.display = 'block';
  s.querySelector('.plus').style.display = 'none';
  s.classList.add('filled');
  closeModal();
  
  const log = document.getElementById('console');
  log.innerHTML += `<div class="log-line">> Карта ${name} добавлена в слот ${curSlot+1}</div>`;
  log.scrollTop = log.scrollHeight;
}

function startAnalysis() {
  if(deck.includes(null)) return tg.showAlert("Заполни все слоты!");
  
  const d = deck;
  const avgCost = (d.reduce((a,b) => a + b.cost, 0) / 8).toFixed(1);
  const winCons = d.filter(c => c.win).length;
  const airDefense = d.filter(c => c.air).length;
  const splashUnits = d.filter(c => c.splash).length;
  const buildings = d.filter(c => c.type === 'building').length;

  let title, verdict, tag, plus = [], minus = [];

  // ЛОГИКА АНАЛИЗА
  if(winCons === 0) {
    tag = "CRITICAL ERROR";
    title = "БЕСПОЛЕЗНЫЙ НАБОР КАРТ";
    verdict = "Ты собрал деку без условия победы. Ты планируешь выигрывать за счет того, что противник умрет от смеха? Без Хога, Шара или Гиганта ты просто манекен для битья.";
    minus.push("Отсутствует Win-Condition (нет карт, бьющих по башне)");
  } else if(avgCost > 4.5) {
    tag = "HEAVY UNIT";
    title = "ЭЛИКСИРНОЕ ОЖИРЕНИЕ";
    verdict = "Твоя дека тяжелее, чем твоя бывшая. Пока ты накопишь на одну карту, противник трижды прокрутит цикл. Один неверный шаг — и ты в пролете.";
    minus.push("Слишком дорогой цикл (Avg: " + avgCost + ")");
    plus.push("Огромная огневая мощь в двойном эликсире");
  } else if(airDefense < 2) {
    tag = "VULNERABLE";
    title = "БОЯЗНЬ ВЫСОТЫ";
    verdict = "У тебя почти нет защиты от воздуха. Один Шарик или Лава — и твоя башня превратится в руины. Надеюсь, твой интернет вырубится раньше, чем прилетят миньоны.";
    minus.push("Критически мало анти-эйр юнитов");
  } else if(winCons === 1 && avgCost < 3.5) {
    tag = "PRO-BUILD";
    title = "ДИСЦИПЛИНИРОВАННЫЙ ЦИКЛ";
    verdict = "Неплохо. Дека выглядит сбалансированной и быстрой. Видно, что ты не просто тыкал в экран, а немного думал. Но помни: скилл не копируется вместе с декой.";
    plus.push("Быстрый цикл карт", "Хороший баланс защиты и атаки");
  } else {
    tag = "AVERAGE";
    title = "ТИПИЧНЫЙ СЕРЕДНЯК";
    verdict = "Играть можно, но без энтузиазма. Дека рабочая, но против потных игроков из топа ты рассыпешься как карточный домик.";
    plus.push("Есть чем атаковать", "Средняя выживаемость");
    minus.push("Нет четкой специализации");
  }

  // Общие проверки
  if(splashUnits > 0) plus.push("Есть сплэш-урон против орд");
  if(buildings > 0) plus.push("Здание в защите облегчит жизнь");
  else minus.push("Нет здания — кабаны и гиганты будут у тебя дома");

  // Вывод
  document.getElementById('res-tag').innerText = tag;
  document.getElementById('res-title').innerText = title;
  document.getElementById('res-verdict').innerText = verdict;
  document.getElementById('res-plus').innerHTML = plus.map(p => `<li>${p}</li>`).join('');
  document.getElementById('res-minus').innerHTML = minus.map(m => `<li>${m}</li>`).join('');
  document.getElementById('res-grid').innerHTML = d.map(c => `<img src="https://raw.githubusercontent.com/RoyaleAPI/cr-api-assets/master/cards/${c.id}.png">`).join('');
  
  document.getElementById('result').style.display = 'flex';
  tg.HapticFeedback.notificationOccurred('success');
}
</script>
</body>
</html>
