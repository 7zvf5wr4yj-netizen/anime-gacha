<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CR_TACTICAL_MAINFRAME_v6.0</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #00ff41;
      --pink: #ff2a6d;
      --blue: #05d9e8;
      --bg: #020205;
      --surface: rgba(10, 10, 15, 0.95);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      background: var(--bg);
      color: var(--green);
      font-family: 'JetBrains Mono', monospace;
      margin: 0;
      overflow: hidden;
      height: 100vh;
    }

    /* CRT Scanline Effect */
    body::after {
      content: " ";
      display: block;
      position: absolute;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                  linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
      z-index: 9999;
      pointer-events: none;
      background-size: 100% 3px, 3px 100%;
    }

    .app-wrapper {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 500px;
      margin: 0 auto;
      border: 1px solid var(--green);
      position: relative;
    }

    /* Header & Stats */
    .header {
      padding: 15px;
      text-align: center;
      border-bottom: 2px solid var(--green);
      background: var(--surface);
    }
    .header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 16px;
      margin: 0;
      letter-spacing: 3px;
      text-shadow: 0 0 10px var(--green);
    }

    .live-stats {
      display: flex;
      justify-content: space-around;
      padding: 10px;
      background: rgba(0, 255, 65, 0.1);
      font-size: 12px;
      border-bottom: 1px solid var(--green);
    }
    .stat-val { color: var(--blue); font-weight: bold; }

    /* Deck Grid */
    .deck-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 15px;
    }

    .slot {
      aspect-ratio: 1/1.2;
      background: #000;
      border: 1px solid #333;
      border-radius: 4px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.3s;
    }
    .slot.filled { border-color: var(--green); box-shadow: inset 0 0 10px rgba(0, 255, 65, 0.1); }
    .slot img { width: 100%; height: 100%; object-fit: contain; }
    
    .slot .remove-btn {
      position: absolute;
      top: -6px; right: -6px;
      background: var(--pink);
      color: white;
      width: 18px; height: 18px;
      border-radius: 50%;
      font-size: 12px;
      display: none;
      align-items: center; justify-content: center;
      z-index: 10;
    }
    .slot.filled:hover .remove-btn { display: flex; }

    /* Console */
    .console {
      flex: 1;
      background: #000;
      padding: 15px;
      font-size: 10px;
      overflow-y: auto;
      border-top: 1px solid var(--green);
      line-height: 1.4;
    }
    .log-entry { margin-bottom: 4px; border-left: 2px solid var(--green); padding-left: 8px; }
    .log-entry.warn { border-color: var(--pink); color: var(--pink); }

    /* Main Button */
    .btn-action {
      margin: 15px;
      padding: 18px;
      background: transparent;
      border: 2px solid var(--green);
      color: var(--green);
      font-family: 'Orbitron';
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      transition: 0.2s;
      position: relative;
    }
    .btn-action:active { background: var(--green); color: #000; }
    .btn-action.pulse { animation: pulseBtn 2s infinite; }

    @keyframes pulseBtn {
      0% { box-shadow: 0 0 0px var(--green); }
      50% { box-shadow: 0 0 15px var(--green); }
      100% { box-shadow: 0 0 0px var(--green); }
    }

    /* Modal List */
    .modal {
      position: fixed; inset: 0;
      background: var(--bg);
      z-index: 1000;
      display: none;
      flex-direction: column;
    }
    .modal-header { padding: 15px; border-bottom: 1px solid var(--green); }
    #search {
      width: 100%;
      background: #111;
      border: 1px solid var(--green);
      color: var(--green);
      padding: 12px;
      font-family: 'JetBrains Mono';
      outline: none;
    }
    .filter-tabs {
      display: flex; gap: 5px; padding: 10px 15px; overflow-x: auto;
    }
    .tab {
      padding: 5px 12px; border: 1px solid #333; font-size: 10px; white-space: nowrap; cursor: pointer;
    }
    .tab.active { border-color: var(--blue); color: var(--blue); }

    .card-list {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 10px; padding: 15px; overflow-y: auto;
    }
    .card-item {
      background: #080808; border: 1px solid #222; border-radius: 6px;
      padding: 5px; text-align: center; position: relative;
      animation: cardIn 0.4s ease backwards;
    }
    @keyframes cardIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .card-item img { width: 100%; }
    .card-cost { position: absolute; top: 2px; left: 2px; background: rgba(0,0,0,0.8); color: var(--blue); padding: 2px 5px; font-size: 10px; border-radius: 4px; }
    .card-name { font-size: 8px; margin-top: 4px; color: #888; text-transform: uppercase; }

    /* Result View */
    .result-view {
      position: fixed; inset: 0; background: var(--bg); z-index: 2000;
      display: none; flex-direction: column; padding: 20px; overflow-y: auto;
    }
    .result-card { border: 1px solid var(--green); padding: 20px; background: rgba(0,255,65,0.03); border-radius: 4px; }
    .verdict-tag { display: inline-block; padding: 4px 10px; background: var(--green); color: #000; font-weight: 900; margin-bottom: 15px; }
    .verdict-tag.bad { background: var(--pink); }
    
    .list-section { margin: 15px 0; font-size: 13px; }
    .list-section h4 { color: var(--green); margin: 0 0 8px 0; font-size: 11px; text-transform: uppercase; }
    .list-section ul { padding-left: 18px; margin: 0; }
    .list-section li { margin-bottom: 5px; }
    .list-section.minus li { color: var(--pink); }

    .recommendation { border-top: 1px dashed #333; margin-top: 15px; padding-top: 15px; color: var(--blue); font-size: 12px; line-height: 1.5; }
    
    .btn-secondary { background: var(--blue); color: #000; border: none; padding: 15px; font-family: 'Orbitron'; font-weight: bold; margin-top: 10px; cursor: pointer; }

    .rarity-dot { position: absolute; bottom: 5px; right: 5px; width: 6px; height: 6px; border-radius: 50%; }
    .rarity-common { background: #ccc; }
    .rarity-rare { background: #ff7e00; }
    .rarity-epic { background: #e000ff; }
    .rarity-legendary { background: #00f0ff; }
    .rarity-champion { background: #ffca00; }
  </style>
</head>
<body>

<div class="app-wrapper">
  <div class="header"><h1>TACTICAL_MAINFRAME_v6.0</h1></div>
  
  <div class="live-stats">
    <div>AVG_ELIXIR: <span id="stat-avg" class="stat-val">0.0</span></div>
    <div>CARDS: <span id="stat-count" class="stat-val">0/8</span></div>
  </div>

  <div class="deck-grid" id="grid">
    </div>

  <div class="console" id="console">
    <div class="log-entry">Система готова. Ожидание ввода данных колоды...</div>
  </div>

  <button class="btn-action pulse" onclick="startAnalysis()">АНАЛИЗ ЭФФЕКТИВНОСТИ</button>
</div>

<div id="modal" class="modal">
  <div class="modal-header">
    <input type="text" id="search" placeholder="NAME_SEARCH..." oninput="renderCards()">
  </div>
  <div class="filter-tabs">
    <div class="tab active" onclick="setFilter('all', this)">ВСЕ</div>
    <div class="tab" onclick="setFilter('wincon', this)">ВИНКОН</div>
    <div class="tab" onclick="setFilter('spell', this)">ЗАКЛИНАНИЯ</div>
    <div class="tab" onclick="setFilter('building', this)">ЗДАНИЯ</div>
    <div class="tab" onclick="setFilter('champion', this)">ГЕРОИ</div>
  </div>
  <div class="card-list" id="card-list"></div>
  <button class="btn-action" style="margin-top:auto" onclick="closeModal()">ОТМЕНА</button>
</div>

<div id="result" class="result-view">
  <div id="capture-area" class="result-card">
    <div style="font-size: 10px; opacity: 0.6; margin-bottom: 5px;">STRATEGY_REPORT_#0882</div>
    <div id="res-archetype" style="color:var(--blue); font-weight: bold; margin-bottom: 5px;">---</div>
    <div id="res-verdict" class="verdict-tag">---</div>
    
    <div class="list-section">
      <h4>✅ Сильные стороны:</h4>
      <ul id="res-pros"></ul>
    </div>
    
    <div class="list-section minus">
      <h4>❌ Уязвимости:</h4>
      <ul id="res-cons"></ul>
    </div>

    <div class="recommendation">
      <strong>СОВЕТ_ШТАБА:</strong> <span id="res-tip">---</span>
    </div>

    <div id="res-mini-grid" style="display:grid; grid-template-columns:repeat(8,1fr); gap:2px; margin-top:20px; opacity:0.5"></div>
  </div>
  
  <button class="btn-secondary" onclick="saveImage()">ПОДЕЛИТЬСЯ ОТЧЕТОМ</button>
  <button class="btn-action" style="background:#111" onclick="location.reload()">НОВЫЙ ТЕСТ</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

// ПОЛНАЯ БАЗА КАРТ (Краткий список основных, добавь остальные по аналогии)
const FULL_DB = [
  {n:"Мегарыцарь", id:"mega-knight", cost:7, type:"troop", target:"ground", splash:true, rarity:"legendary", tank:true},
  {n:"Всадник на кабане", id:"hog-rider", cost:4, type:"wincon", target:"ground", splash:false, rarity:"rare"},
  {n:"П.Е.К.К.А.", id:"pekka", cost:7, type:"troop", target:"ground", splash:false, rarity:"epic", tank:true},
  {n:"Маленький принц", id:"little-prince", cost:3, type:"champion", target:"both", splash:false, rarity:"champion"},
  {n:"Бревно", id:"the-log", cost:2, type:"spell", target:"ground", splash:true, rarity:"legendary"},
  {n:"Огненный шар", id:"fireball", cost:4, type:"spell", target:"both", splash:true, rarity:"rare"},
  {n:"Бочка с гоблинами", id:"goblin-barrel", cost:3, type:"wincon", target:"ground", splash:false, rarity:"epic"},
  {n:"Голем", id:"golem", cost:8, type:"wincon", target:"ground", splash:true, rarity:"epic", tank:true},
  {n:"Адская башня", id:"inferno-tower", cost:5, type:"building", target:"both", splash:false, rarity:"rare"},
  {n:"Арбалет", id:"x-bow", cost:6, type:"wincon", target:"ground", splash:false, rarity:"epic"},
  {n:"Шар", id:"balloon", cost:5, type:"wincon", target:"air", splash:false, rarity:"epic"},
  {n:"Скелеты", id:"skeletons", cost:1, type:"troop", target:"ground", splash:false, rarity:"common"},
  {n:"Электро-маг", id:"electro-wizard", cost:4, type:"troop", target:"both", splash:true, rarity:"legendary"},
  {n:"Стрелы", id:"arrows", cost:3, type:"spell", target:"both", splash:true, rarity:"common"},
  {n:"Королевский гигант", id:"royal-giant", cost:6, type:"wincon", target:"ground", splash:false, rarity:"common", tank:true},
  {n:"Тесла", id:"tesla", cost:4, type:"building", target:"both", splash:false, rarity:"common"},
  {n:"Валькирия", id:"valkyrie", cost:4, type:"troop", target:"ground", splash:true, rarity:"rare"},
  {n:"Яд", id:"poison", cost:4, type:"spell", target:"both", splash:true, rarity:"epic"},
  {n:"Шахтер", id:"miner", cost:3, type:"wincon", target:"ground", splash:false, rarity:"legendary"},
  {n:"Принцесса", id:"princess", cost:3, type:"troop", target:"both", splash:true, rarity:"legendary"},
  {n:"Гоблинский бур", id:"goblin-drill", cost:4, type:"wincon", target:"ground", splash:false, rarity:"epic"},
  {n:"Электрогигант", id:"electro-giant", cost:7, type:"wincon", target:"ground", splash:true, rarity:"epic", tank:true},
  {n:"Разряд", id:"zap", cost:2, type:"spell", target:"both", splash:true, rarity:"common"},
  {n:"Гигант", id:"giant", cost:5, type:"wincon", target:"ground", splash:false, rarity:"rare", tank:true}
  // ... Сюда можно добавить еще 80+ карт в таком же формате
];

let deck = Array(8).fill(null);
let activeSlot = 0;
let currentFilter = 'all';

// Создание сетки
const grid = document.getElementById('grid');
for(let i=0; i<8; i++) {
  grid.innerHTML += `
    <div class="slot" id="slot-${i}" onclick="openPicker(${i})">
      <span style="opacity:0.2">+</span>
      <img id="img-${i}" style="display:none">
      <div class="remove-btn" onclick="clearSlot(event, ${i})">×</div>
    </div>`;
}

function openPicker(i) {
  activeSlot = i;
  document.getElementById('modal').style.display = 'flex';
  renderCards();
  tg.HapticFeedback.impactOccurred('medium');
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderCards();
}

function renderCards() {
  const q = document.getElementById('search').value.toLowerCase();
  const list = document.getElementById('card-list');
  
  let filtered = FULL_DB.filter(c => c.n.toLowerCase().includes(q));
  if(currentFilter !== 'all') {
    if(currentFilter === 'champion') filtered = filtered.filter(c => c.rarity === 'champion');
    else filtered = filtered.filter(c => c.type === currentFilter);
  }

  list.innerHTML = filtered.map((c, idx) => `
    <div class="card-item" onclick="selectCard('${c.id}')" style="animation-delay: ${idx*0.02}s">
      <div class="card-cost">${c.cost}</div>
      <img src="https://raw.githubusercontent.com/RoyaleAPI/cr-api-assets/master/cards/${c.id}.png">
      <div class="card-name">${c.n}</div>
      <div class="rarity-dot rarity-${c.rarity}"></div>
    </div>
  `).join('');
}

function selectCard(id) {
  const card = FULL_DB.find(c => c.id === id);
  
  // Запрет дубликатов
  if(deck.some(c => c && c.id === id)) {
    tg.showAlert("КАРТА УЖЕ ЕСТЬ В КОЛОДЕ! Дубликаты запрещены протоколом.");
    tg.HapticFeedback.notificationOccurred('error');
    return;
  }

  deck[activeSlot] = card;
  updateUI();
  closeModal();
  log(`Модуль ${card.n.toUpperCase()} установлен.`);
  tg.HapticFeedback.impactOccurred('light');
}

function clearSlot(e, i) {
  e.stopPropagation();
  deck[i] = null;
  updateUI();
  log(`Слот ${i+1} деактивирован.`, true);
}

function updateUI() {
  let totalCost = 0;
  let count = 0;
  
  deck.forEach((c, i) => {
    const slot = document.getElementById(`slot-${i}`);
    const img = document.getElementById(`img-${i}`);
    if(c) {
      img.src = `https://raw.githubusercontent.com/RoyaleAPI/cr-api-assets/master/cards/${c.id}.png`;
      img.style.display = 'block';
      slot.classList.add('filled');
      slot.querySelector('span').style.display = 'none';
      totalCost += c.cost;
      count++;
    } else {
      img.style.display = 'none';
      slot.classList.remove('filled');
      slot.querySelector('span').style.display = 'block';
    }
  });

  const avg = count > 0 ? (totalCost / 8).toFixed(1) : "0.0";
  document.getElementById('stat-avg').innerText = avg;
  document.getElementById('stat-count').innerText = `${count}/8`;
}

function log(text, warn = false) {
  const c = document.getElementById('console');
  c.innerHTML += `<div class="log-entry ${warn ? 'warn' : ''}">> ${text}</div>`;
  c.scrollTop = c.scrollHeight;
}

function startAnalysis() {
  if(deck.includes(null)) {
    tg.showAlert("ОШИБКА: Колода не завершена. Требуется 8 карт.");
    return;
  }

  const d = deck;
  const avg = d.reduce((a,b) => a + b.cost, 0) / 8;
  const winCons = d.filter(c => c.type === 'wincon');
  const spells = d.filter(c => c.type === 'spell');
  const airDef = d.filter(c => c.target === 'both' || c.target === 'air').length;
  const splash = d.filter(c => c.splash).length;
  const buildings = d.filter(c => c.type === 'building').length;
  const tanks = d.filter(c => c.tank).length;

  let pros = [], cons = [], archetype = "Balanced Control", verdict = "СТАБИЛЬНО", isBad = false;

  // 1. Win Condition
  if(winCons.length === 0) {
    cons.push("Нет условия победы (Win-Con). Ты не сможешь снести башню.");
    verdict = "КРИТИЧЕСКАЯ ОШИБКА"; isBad = true;
  } else {
    pros.push(`Основная угроза: ${winCons[0].n}`);
  }

  // 2. Спеллы
  if(spells.length === 0) cons.push("Нет заклинаний. Противник задавит тебя количеством.");
  else if(spells.length === 1) cons.push("Мало заклинаний. Рекомендуется связка Тяжелое+Легкое.");
  else pros.push("Хороший контроль заклинаниями.");

  // 3. Воздух
  if(airDef < 2) { cons.push("Слабое ПВО. Воздушные шары уничтожат тебя."); isBad = true; }
  else pros.push("Надежная защита от воздуха.");

  // 4. Архетип
  if(avg > 4.2 && tanks > 0) archetype = "Heavy Beatdown";
  else if(avg < 3.2) archetype = "Fast Cycle";
  else if(buildings > 0) archetype = "Defensive Control";

  // 5. Здания
  if(buildings === 0) cons.push("Нет зданий. Уязвим для Хога и Гиганта.");

  let tip = "Сбалансированная колода. Можно идти в бой.";
  if(avg > 4.5) tip = "Замени одну карту на Скелетов или Духа для ускорения цикла.";
  if(winCons.length === 0) tip = "Обязательно добавь Хога, Гиганта или Бочку!";

  // Вывод результата
  document.getElementById('res-archetype').innerText = `АРХЕТИП: ${archetype.toUpperCase()}`;
  document.getElementById('res-verdict').innerText = verdict;
  document.getElementById('res-verdict').className = `verdict-tag ${isBad ? 'bad' : ''}`;
  document.getElementById('res-pros').innerHTML = pros.map(p => `<li>${p}</li>`).join('');
  document.getElementById('res-cons').innerHTML = cons.map(c => `<li>${c}</li>`).join('');
  document.getElementById('res-tip').innerText = tip;
  document.getElementById('res-mini-grid').innerHTML = d.map(c => `<img src="https://raw.githubusercontent.com/RoyaleAPI/cr-api-assets/master/cards/${c.id}.png" style="width:100%">`).join('');

  document.getElementById('result').style.display = 'flex';
  tg.HapticFeedback.notificationOccurred(isBad ? 'error' : 'success');
}

function saveImage() {
  const target = document.getElementById('capture-area');
  html2canvas(target, { backgroundColor: '#020205' }).then(canvas => {
    const link = document.createElement('a');
    link.download = 'cyberdeck_report.png';
    link.href = canvas.toDataURL();
    link.click();
    tg.showAlert("ОТЧЕТ СОХРАНЕН В ГАЛЕРЕЮ.");
  });
}
</script>
</body>
</html>
